services:

  # ==================================================
  # StockIQ Database
  # ==================================================
  stock_postgres:
    image: postgres:15
    container_name: stock_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_market_db

    ports:
      - "5432:5432"

    volumes:
      - stockiq_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================================================
  # Airflow Metadata Database
  # ==================================================
  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5433:5432"

    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================================================
  # Airflow Initialization
  # ==================================================
  airflow-init:

    build:
      context: .
      dockerfile: Dockerfile.airflow

    depends_on:
      airflow_postgres:
        condition: service_healthy

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@admin.com
      --password admin
      "

  # ==================================================
  # Airflow Webserver
  # ==================================================
  airflow-webserver:

    build:
      context: .
      dockerfile: Dockerfile.airflow

    container_name: airflow_webserver

    restart: always

    depends_on:
      - airflow-init

    environment:

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow

      PYTHONPATH: /opt/airflow

      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: stock_postgres
      DB_PORT: 5432
      DB_NAME: stock_market_db
      

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./jars:/opt/airflow/jars

    ports:
      - "8080:8080"

    command: webserver

  # ==================================================
  # Airflow Scheduler
  # ==================================================
  airflow-scheduler:

    build:
      context: .
      dockerfile: Dockerfile.airflow

    container_name: airflow_scheduler

    restart: always

    depends_on:
      - airflow-webserver

    environment:

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres:5432/airflow

      PYTHONPATH: /opt/airflow
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: stock_postgres
      DB_PORT: 5432
      DB_NAME: stock_market_db

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./jars:/opt/airflow/jars

    command: scheduler

volumes:
  stockiq_postgres_data:
  airflow_postgres_data:
